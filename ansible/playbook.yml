---
- name: Deploy Dockerized Flask App on EC2
  hosts: webserver
  become: yes

  tasks:
    - name: Update apt packages
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Copy project files to EC2
      copy:
        src: ../
        dest: /home/ubuntu/devops-project
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Build Docker image on EC2
      command: docker build -t devops-flask-app .
      args:
        chdir: /home/ubuntu/devops-project

    - name: Remove old container if exists
      shell: docker rm -f devops-app || true

    - name: Run Docker container
      command: docker run -d -p 5000:5000 --name devops-app devops-flask-app